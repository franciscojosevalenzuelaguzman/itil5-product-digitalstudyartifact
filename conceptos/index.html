  icrExample:"ICR integra DevOps a lo largo del ciclo: CI/CD para la app, IaC para infraestructura multiregión, monitoring-as-code para observabilidad, y feedback continuo de producción hacia el backlog de producto.",
  trap:"DevOps NO se limita a Build — aplica a 6 de las 8 actividades. En el examen, la respuesta correcta es que ITIL provee el framework y DevOps las prácticas y técnicas (SP1 Q13)."
};

const defs=[
  {t:"Valor",d:"Los beneficios, la utilidad y la importancia percibidos de algo.",ej:"Para un cliente ICR: poder reservar un auto en 30 segundos desde su celular."},
  {t:"Producto digital",d:"Combinación de recursos basada en tecnología digital y diseñada para ofrecer valor a consumidores.",ej:"La Unified Mobile App de ICR."},

  {t:"Oferta de servicio",d:"Descripción formal de servicios para un grupo de consumidores objetivo. Puede incluir bienes, acceso a recursos y acciones de servicio.",ej:"Alquiler tradicional, car-sharing, transporte autónomo — tres ofertas distintas."},
  {t:"Cadena de valor",d:"Conjunto completo de actividades que habilita el valor a través de la provisión de un producto o servicio.",ej:"Las 8 actividades de ICR: Descubrir→...→Dar soporte."},
  {t:"Flujo de valor",d:"Serie de pasos que una organización usa para crear y entregar productos/servicios. Es la secuencia REAL, no un blueprint.",ej:"El flujo real desde que un cliente busca un auto hasta que lo devuelve."},
  {t:"Resultado (Outcome)",d:"Un resultado para una parte interesada habilitado por una o más salidas.",ej:"El cliente llega a su destino de forma segura y a tiempo."},

  {t:"Cocreación de valor",d:"El valor se cocrea entre proveedor y consumidor; no es algo que el proveedor 'entrega' solo.",ej:"ICR provee la app y los vehículos; el cliente aporta feedback, uso y pago. Ambos contribuyen."},
  {t:"SLA",d:"Acuerdo documentado entre proveedor y cliente que identifica servicios requeridos y nivel esperado.",ej:"Reserva completada en <30s, disponibilidad 99.9%, soporte en <4h."},
  {t:"PESTLE",d:"Factores Políticos, Económicos, Sociales, Tecnológicos, Legales y Ambientales que afectan el contexto externo.",ej:"Regulaciones de vehículos autónomos varían por país — afectan qué servicios puede ofrecer ICR en cada mercado."},
  {t:"Las 4 Dimensiones",d:"Organizaciones y personas; Información y tecnología; Socios y proveedores; Flujos de valor y procesos.",ej:"ICR equilibra equipos capacitados + cloud/AI + proveedores de pagos + flujos optimizados."}
];

const allTraps=[
  "El ITIL VS tiene 5 componentes. La cadena de valor es el CENTRAL. No confundir VS (sistema) con cadena de valor (un componente del sistema).",
  "Producto digital PROVEE capacidades; servicio digital HABILITA la realización de valor a través del USO de esas capacidades. NO son sinónimos (SP1 Q2).",
  "La cadena de valor NO es una secuencia fija lineal. Las actividades se combinan dinámicamente en flujos de valor según el contexto (SP1 Q3).",
  "Los flujos de valor son la secuencia REAL de actividades, no un modelo predeterminado.",
  "ITIL = framework; DevOps = prácticas complementarias. DevOps aplica a 6 actividades, NO solo a desarrollo (SP1 Q13).",
  "Las 4 Dimensiones son internas; PESTLE es externo. Las dimensiones están AFECTADAS por factores PESTLE.",
  "Experiencia NO se puede garantizar — solo sus PROXIES (tiempos de respuesta, usabilidad, satisfacción) pueden acordarse.",
  "'Optimizar y automatizar' es UN SOLO principio. Primero optimizar, LUEGO automatizar. Automatizar basura produce basura más rápido.",
  "Gobernanza DIRIGE y CONTROLA; la gestión EJECUTA. No son lo mismo.",
  "Las 34 prácticas combinan recursos de las 4 Dimensiones — no son procesos independientes.",
  "Outcome ≠ Output. Output es lo que produces (un reporte); Outcome es el resultado para el stakeholder (mejor decisión)."
];

const allQuiz=[
  {q:"¿Cuál es la diferencia conceptual entre producto digital y servicio digital?",o:["Son sinónimos","El producto provee capacidades; el servicio habilita realización de valor a través del uso","El producto entrega valor directamente; el servicio soporta operaciones internas","El producto define resultados; el servicio define recursos técnicos"],a:1},
  {q:"¿Cómo soportan las actividades de la cadena de valor el ciclo de vida?",o:["Definiendo estructuras de gobernanza","Habilitando actividades de gestión del ciclo de vida que crean y entregan valor","Alineando etapas con ejecución operativa de procesos","Secuenciando actividades en proceso lineal fijo"],a:1},
  {q:"¿Cuáles son los 5 componentes del Sistema de Valor de ITIL?",o:["Principios, Gobernanza, Cadena de valor, Prácticas, Mejora continua","Principios, Estrategia, Cadena de valor, Procesos, Automatización","Gobernanza, Cadena de valor, Prácticas, AI, Mejora continua","Principios, Dimensiones, Cadena de valor, Prácticas, PESTLE"],a:0},
  {q:"¿Qué principio dice 'evaluar lo que ya existe antes de crear algo nuevo'?",o:["Enfocarse en el valor","Empezar donde uno se encuentre","Progresar iterativamente","Mantenerlo simple"],a:1},
  {q:"¿Cómo colaboran ITIL y DevOps?",o:["ITIL provee el framework; DevOps prácticas y técnicas complementarias","ITIL reemplaza DevOps","DevOps se limita a desarrollo de software","DevOps es gobernanza sobre ITIL"],a:0},
  {q:"¿Las 4 características que moldean percepción de valor son...?",o:["Utilidad, garantía, sostenibilidad y experiencia","Utilidad, garantía, seguridad y disponibilidad","Funcionalidad, rendimiento, seguridad y costo","Diseño, construcción, operación y soporte"],a:0},
  {q:"¿Se puede garantizar la 'experiencia' de un servicio?",o:["Sí, con SLAs detallados","No — solo sus proxies pueden acordarse y monitorizarse"],a:1},
  {q:"¿Qué principio dice 'primero optimizar, luego automatizar'?",o:["Progresar iterativamente","Mantenerlo simple","Optimizar y automatizar","Pensar holísticamente"],a:2},
  {q:"Los flujos de valor son...",o:["Un modelo predeterminado que define cómo debe ejecutarse el trabajo","La secuencia REAL de actividades realizadas, no un blueprint predeterminado"],a:1},
  {q:"¿La gobernanza y la gestión son lo mismo?",o:["Sí, son sinónimos","No — gobernanza dirige y controla; gestión ejecuta"],a:1},
  {q:"¿Outcome y Output son lo mismo?",o:["Sí","No — Output es el entregable; Outcome es el resultado para el stakeholder"],a:1},
  {q:"Un fallo de pagos causado por un proveedor externo aparece al usuario como fallo de ICR. ¿Qué dimensión está descuidada?",o:["Organizaciones y personas","Información y tecnología","Socios y proveedores","Flujos de valor y procesos"],a:2}
];

const S=({title,color="#4F46E5",children,open:io=true})=>{
  const[o,setO]=useState(io);
  return <div style={{marginBottom:"10px"}}>
    <button onClick={()=>setO(!o)} style={{display:"flex",alignItems:"center",gap:"7px",width:"100%",background:"none",border:"none",cursor:"pointer",padding:"7px 0",borderBottom:`2px solid ${color}`,marginBottom:o?"8px":0}}>
      <span style={{fontSize:"9px",color,transform:o?"rotate(90deg)":"rotate(0)",transition:"transform .15s"}}>▶</span>
      <span style={{fontSize:"13px",fontWeight:700,color}}>{title}</span>
    </button>
    {o&&children}
  </div>;
};

const App = function App(){
  const[tab,setTab]=useState("principles");
  const[qs,setQs]=useState({});

  return <div style={{fontFamily:"'Inter',-apple-system,sans-serif",color:"var(--text-color,#1a1a2e)",minHeight:"100vh"}}>
    <div style={{background:"linear-gradient(135deg,#1e1b4b,#312e81)",padding:"16px 14px 12px",borderRadius:"0 0 14px 14px",color:"#fff",marginBottom:"12px"}}>
      <div style={{fontSize:"17px",fontWeight:800}}>ITIL Product v5 — Conceptos Fundacionales</div>
      <div style={{fontSize:"11px",opacity:.65,marginBottom:"10px"}}>Módulo 1 · Cap. 1-2 Official Book · ~8 preguntas del examen</div>
      <div style={{display:"flex",gap:"4px",overflowX:"auto",paddingBottom:"3px"}}>
        {tabs.map(s=><button key={s.id} onClick={()=>setTab(s.id)} style={{padding:"5px 9px",fontSize:"10px",fontWeight:tab===s.id?700:500,whiteSpace:"nowrap",background:tab===s.id?"rgba(255,255,255,.2)":"rgba(255,255,255,.06)",color:"#fff",border:tab===s.id?"2px solid rgba(255,255,255,.4)":"1px solid rgba(255,255,255,.12)",borderRadius:"5px",cursor:"pointer",opacity:tab===s.id?1:.6}}>{s.icon} {s.name}</button>)}
      </div>
    </div>

    <div style={{padding:"0 10px 20px"}}>
      {tab==="principles"&&<>
        <div style={{fontSize:"12px",lineHeight:1.6,marginBottom:"10px",padding:"8px 10px",background:"var(--card-bg,#f8f9fa)",borderRadius:"8px"}}>Los 7 principios guía apoyan a la organización en <strong>toda circunstancia</strong>. Son UNIVERSALES — aplican a toda actividad, decisión y nivel organizacional.</div>
        {principles.map((p,i)=><div key={i} style={{padding:"10px",background:"var(--card-bg,#f8f9fa)",borderRadius:"8px",marginBottom:"8px",borderLeft:`4px solid ${p.color}`}}>
          <div style={{fontSize:"14px",fontWeight:700,color:p.color}}>{i+1}. {p.n}</div>
          <div style={{fontSize:"10px",color:"var(--text-secondary,#6b7280)",marginBottom:"4px"}}>{p.en}</div>
          <div style={{fontSize:"11px",lineHeight:1.5,marginBottom:"8px"}}>{p.d}</div>
          <S title="🚗 Ejemplos ICR" color={p.color} open={false}>
            {p.icr.map((ex,j)=><div key={j} style={{fontSize:"10px",padding:"3px 8px",marginBottom:"3px",background:`${p.color}06`,borderRadius:"3px",lineHeight:1.4}}>• {ex}</div>)}
          </S>
          <S title="📋 Cómo aplica por actividad" color={p.color} open={false}>
            {p.activities.map((a,j)=><div key={j} style={{display:"flex",gap:"6px",marginBottom:"3px",fontSize:"10px"}}><span style={{fontWeight:700,color:p.color,minWidth:"70px"}}>{a.act}</span><span>{a.how}</span></div>)}
          </S>
          <div style={{display:"flex",gap:"6px",marginTop:"6px"}}>
            <div style={{flex:1,fontSize:"10px",padding:"4px 8px",background:"#FEF3C7",borderRadius:"4px",lineHeight:1.4}}>⚠️ <strong>Trampa:</strong> {p.trap}</div>
          </div>
          <div style={{fontSize:"10px",padding:"4px 8px",background:"#FEE2E2",borderRadius:"4px",marginTop:"4px",lineHeight:1.4}}>❌ <strong>Antipatrón:</strong> {p.antipattern}</div>
        </div>)}
      </>}

      {tab==="dimensions"&&<>
        <div style={{fontSize:"12px",lineHeight:1.6,marginBottom:"10px",padding:"8px 10px",background:"var(--card-bg,#f8f9fa)",borderRadius:"8px"}}>Las 4 Dimensiones son <strong>interdependientes</strong>. Descuidar una debilita todo el sistema. Cada dimensión está afectada por factores <strong>PESTLE</strong> externos.</div>
        {dimensions.map((dim,i)=><div key={i} style={{padding:"10px",background:"var(--card-bg,#f8f9fa)",borderRadius:"8px",marginBottom:"8px",borderLeft:`4px solid ${dim.color}`}}>
          <div style={{fontSize:"14px",fontWeight:700,color:dim.color}}>{i+1}. {dim.n}</div>
          <div style={{fontSize:"10px",color:"var(--text-secondary,#6b7280)",marginBottom:"4px"}}>{dim.en}</div>
          <div style={{fontSize:"11px",lineHeight:1.5,marginBottom:"8px"}}>{dim.d}</div>
          <S title="🚗 Ejemplos ICR" color={dim.color} open={false}>
            {dim.icr.map((ex,j)=><div key={j} style={{fontSize:"10px",padding:"3px 8px",marginBottom:"3px",background:`${dim.color}06`,borderRadius:"3px",lineHeight:1.4}}>• {ex}</div>)}
          </S>
          <div style={{fontSize:"10px",padding:"5px 8px",background:"#FEE2E2",borderRadius:"4px",marginBottom:"6px",lineHeight:1.4}}>❌ <strong>Si se descuida:</strong> {dim.neglect}</div>
          <S title="Preguntas diagnósticas" color={dim.color} open={false}>
            {dim.questions.map((q,j)=><div key={j} style={{fontSize:"10px",marginBottom:"2px"}}>❓ {q}</div>)}
          </S>
        </div>)}
      </>}

      {tab==="vs"&&<>
        <div style={{fontSize:"12px",lineHeight:1.6,marginBottom:"10px",padding:"8px 10px",background:"var(--card-bg,#f8f9fa)",borderRadius:"8px"}}>El <strong>Sistema de Valor de ITIL (ITIL VS)</strong> combina gobernanza y gestión en un sistema que transforma <strong>oportunidad/demanda</strong> en <strong>valor</strong>.</div>
        <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:"6px",marginBottom:"14px"}}>
          <div style={{padding:"8px 14px",background:"#DC2626",color:"#fff",borderRadius:"20px",fontSize:"11px",fontWeight:700}}>Oportunidad / Demanda</div>
          <span style={{alignSelf:"center",fontSize:"18px"}}>→</span>
          <div style={{padding:"8px 14px",background:"#312e81",color:"#fff",borderRadius:"8px",fontSize:"11px",fontWeight:700}}>ITIL VS (5 componentes)</div>
          <span style={{alignSelf:"center",fontSize:"18px"}}>→</span>
          <div style={{padding:"8px 14px",background:"#059669",color:"#fff",borderRadius:"20px",fontSize:"11px",fontWeight:700}}>Valor</div>
        </div>
        {vsComponents.map((c,i)=><div key={i} style={{padding:"10px",background:"var(--card-bg,#f8f9fa)",borderRadius:"8px",marginBottom:"6px",borderLeft:i===2?"4px solid #7C3AED":"2px solid var(--border-color,#d1d5db)"}}>
          <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"4px"}}>
            <span style={{fontSize:"18px"}}>{c.icon}</span>
            <div style={{fontSize:"13px",fontWeight:700,color:i===2?"#7C3AED":"var(--text-color,#1a1a2e)"}}>{c.n} {i===2&&"← COMPONENTE CENTRAL"}</div>
          </div>
          <div style={{fontSize:"11px",lineHeight:1.5,marginBottom:"4px"}}>{c.d}</div>
          <div style={{fontSize:"10px",padding:"4px 8px",background:i===2?"#7C3AED08":"var(--card-bg,#f0f0f0)",borderRadius:"4px",marginBottom:"4px",lineHeight:1.4}}>🚗 {c.icr}</div>
          <div style={{fontSize:"10px",fontStyle:"italic",color:"var(--text-secondary,#6b7280)"}}>💡 {c.detail}</div>
        </div>)}
      </>}

      {tab==="prodserv"&&<>
        <S title="CADENA DE RELACIONES: Recursos → Productos → Ofertas → Servicios" color="#2563EB">
          {prodServ.chain.map((s,i)=><div key={i} style={{padding:"8px 10px",background:"var(--card-bg,#f8f9fa)",borderRadius:"6px",marginBottom:"5px",borderLeft:`4px solid ${s.c}`}}>
            <div style={{fontSize:"12px",fontWeight:700,color:s.c}}>{s.l.replace("\n"," ")}</div>
            <div style={{fontSize:"10px",lineHeight:1.4,marginBottom:"3px"}}>{s.d}</div>
            <div style={{fontSize:"10px",fontStyle:"italic",color:"var(--text-secondary,#6b7280)"}}>🚗 {s.icr}</div>
            {i<prodServ.chain.length-1&&<div style={{textAlign:"center",fontSize:"14px",color:"#9ca3af",margin:"4px 0"}}>↓ {["componen","habilitan y describen","soportan"][i]}</div>}
          </div>)}
          <div style={{fontSize:"10px",padding:"6px 10px",background:"#7C3AED08",borderRadius:"5px",borderLeft:"3px solid #7C3AED",lineHeight:1.5,marginTop:"6px"}}><strong>Clave del examen:</strong> Los productos proveen capacidades. Las ofertas describen el valor potencial. Cuando los clientes aceptan las ofertas, la entrega y el consumo comienzan. El valor se realiza en el SERVICIO, no en el producto.</div>
        </S>
        <S title="ROLES EN RELACIONES DE SERVICIO" color="#059669">
          {prodServ.roles.map((r,i)=><div key={i} style={{padding:"8px 10px",background:"var(--card-bg,#f8f9fa)",borderRadius:"6px",marginBottom:"5px",borderLeft:"3px solid #059669"}}>
            <div style={{fontSize:"12px",fontWeight:700,color:"#059669"}}>{r.r}</div>
            <div style={{fontSize:"10px",lineHeight:1.4}}>{r.d}</div>
            <div style={{fontSize:"10px",fontStyle:"italic",color:"var(--text-secondary,#6b7280)"}}>🚗 {r.icr}</div>
            <div style={{fontSize:"10px",padding:"3px 6px",background:"#FEF3C7",borderRadius:"3px",marginTop:"3px"}}>⚠️ {r.trap}</div>
          </div>)}
        </S>
      </>}

      {tab==="value"&&<>
        <div style={{fontSize:"12px",lineHeight:1.6,marginBottom:"10px",padding:"8px 10px",background:"var(--card-bg,#f8f9fa)",borderRadius:"8px"}}>El valor se <strong>cocrea</strong> entre proveedor y consumidor. 4 características moldean la percepción de valor. Deben <strong>equilibrarse e integrarse</strong> — no existen aisladas.</div>
        {valueAspects.map((v,i)=><div key={i} style={{padding:"10px",background:"var(--card-bg,#f8f9fa)",borderRadius:"8px",marginBottom:"8px",borderLeft:`4px solid ${v.color}`}}>
          <div style={{fontSize:"14px",fontWeight:700,color:v.color}}>{v.n}</div>
          <div style={{fontSize:"10px",color:"var(--text-secondary,#6b7280)",marginBottom:"4px"}}>{v.sub}</div>
          <div style={{fontSize:"11px",lineHeight:1.5,marginBottom:"6px"}}>{v.d}</div>
          <div style={{fontSize:"10px",padding:"4px 8px",background:`${v.color}08`,borderRadius:"4px",marginBottom:"4px"}}>🚗 {v.icr}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"3px"}}>{v.examples.map((e,j)=><span key={j} style={{fontSize:"9px",padding:"2px 6px",background:`${v.color}10`,color:v.color,borderRadius:"3px",fontWeight:600}}>• {e}</span>)}</div>
        </div>)}
        <div style={{fontSize:"10px",padding:"8px 10px",background:"#FEF3C7",borderRadius:"6px",borderLeft:"3px solid #D97706",lineHeight:1.5}}>⚠️ Utilidad fuerte sin experiencia = vacía. Garantía excelente sin sostenibilidad = pasivos a largo plazo. Diseño robusto con mala experiencia = impide adopción. El valor emerge del EQUILIBRIO.</div>
      </>}

      {tab==="devops"&&<>
        <div style={{fontSize:"12px",lineHeight:1.6,marginBottom:"10px",padding:"8px 10px",background:"var(--card-bg,#f8f9fa)",borderRadius:"8px"}}>{devops.core}</div>
        <S title="PRINCIPIOS COMPARTIDOS" color="#4F46E5">
          <div style={{display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:"8px"}}>{devops.shared.map((s,i)=><span key={i} style={{padding:"4px 10px",fontSize:"10px",background:"#4F46E512",color:"#4F46E5",borderRadius:"4px",fontWeight:600}}>✓ {s}</span>)}</div>
        </S>
        <S title="DEVOPS APLICA A ESTAS 6 ACTIVIDADES" color="#2563EB">
          {devops.activities.map((a,i)=><div key={i} style={{display:"flex",gap:"8px",padding:"5px 8px",marginBottom:"4px",borderLeft:"3px solid #2563EB",background:"var(--card-bg,#f8f9fa)",borderRadius:"4px"}}>
            <span style={{fontSize:"11px",fontWeight:700,color:"#2563EB",minWidth:"75px"}}>{a.act}</span>
            <span style={{fontSize:"10px"}}>{a.how}</span>
          </div>)}
          <div style={{fontSize:"10px",padding:"6px 8px",background:"#FEF3C7",borderRadius:"4px",marginTop:"6px",borderLeft:"3px solid #D97706",lineHeight:1.4}}>⚠️ Entregar y Dar soporte NO se listan explícitamente como actividades DevOps en el libro, aunque DevOps indirectamente las beneficia.</div>
        </S>
        <S title="🚗 ICR + DevOps" color="#059669">
          <div style={{fontSize:"11px",lineHeight:1.5,padding:"6px 8px",background:"#05966908",borderRadius:"4px"}}>{devops.icrExample}</div>
        </S>
        <div style={{fontSize:"10px",padding:"8px 10px",background:"#FEE2E2",borderRadius:"6px",borderLeft:"3px solid #DC2626",marginTop:"8px",lineHeight:1.5}}>⚠️ <strong>Trampa del examen (SP1 Q13):</strong> {devops.trap}</div>
      </>}

      {tab==="traps"&&<>
        <S title="📖 DEFINICIONES CLAVE CON EJEMPLOS" color="#4F46E5">
          {defs.map((d,i)=><div key={i} style={{padding:"6px 10px",background:i%2===0?"var(--card-bg,#f8f9fa)":"transparent",borderRadius:"5px",marginBottom:"2px"}}>
            <div><span style={{fontSize:"11px",fontWeight:700,color:"#4F46E5"}}>{d.t}: </span><span style={{fontSize:"11px"}}>{d.d}</span></div>
            <div style={{fontSize:"10px",fontStyle:"italic",color:"var(--text-secondary,#6b7280)",marginTop:"2px"}}>🚗 {d.ej}</div>
          </div>)}
        </S>
        <S title="⚠️ TRAMPAS DE EXAMEN (11 trampas)" color="#D97706">
          {allTraps.map((t,i)=><div key={i} style={{display:"flex",gap:"5px",padding:"5px 8px",background:"#FEF3C7",borderRadius:"4px",marginBottom:"3px",fontSize:"10px",lineHeight:1.4,borderLeft:"3px solid #D97706"}}><span>⚠️</span><span>{t}</span></div>)}
        </S>
        <S title="🧠 AUTOEVALUACIÓN (12 preguntas)" color="#4F46E5">
          {allQuiz.map((q,qi)=>{
            const ans=qs[qi];const ok=ans===q.a;
            return <div key={qi} style={{padding:"10px",background:"var(--card-bg,#f8f9fa)",borderRadius:"8px",marginBottom:"8px",border:ans!==undefined?(ok?"2px solid #059669":"2px solid #DC2626"):"1px solid var(--border-color,#e5e7eb)"}}>
              <div style={{fontSize:"12px",fontWeight:700,marginBottom:"8px"}}>{qi+1}. {q.q}</div>
              {q.o.map((opt,oi)=>{
                let bg="transparent",brd="1px solid var(--border-color,#d1d5db)",col="var(--text-color,#1a1a2e)";
                if(ans!==undefined&&q.a===oi){bg="#D1FAE5";brd="1.5px solid #059669";col="#065F46";}
                if(ans!==undefined&&ans===oi&&oi!==q.a){bg="#FEE2E2";brd="1.5px solid #DC2626";col="#991B1B";}
                return <button key={oi} onClick={()=>ans===undefined&&setQs(p=>({...p,[qi]:oi}))} disabled={ans!==undefined} style={{display:"block",width:"100%",textAlign:"left",padding:"6px 10px",marginBottom:"4px",fontSize:"11px",background:bg,border:brd,borderRadius:"5px",cursor:ans!==undefined?"default":"pointer",color:col,fontWeight:ans!==undefined&&(q.a===oi||ans===oi)?600:400}}>{String.fromCharCode(65+oi)}) {opt}{ans!==undefined&&q.a===oi?" ✅":""}{ans!==undefined&&ans===oi&&oi!==q.a?" ❌":""}</button>;
              })}
            </div>;
          })}
        </S>
      </>}
    </div>
  </div>;
}


    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
  <script>
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
